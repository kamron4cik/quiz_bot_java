server:
  port: 8083

spring:
  application:
    name: quiz-service
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/quizplatform}
    username: ${SPRING_DATASOURCE_USERNAME:quizplatform}
    password: ${SPRING_DATASOURCE_PASSWORD:quizplatform}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    table: flyway_schema_history_quiz
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

services:
  user-service:
    base-url: ${USER_SERVICE_URL:http://localhost:8082}
  question-service:
    base-url: ${QUESTION_SERVICE_URL:http://localhost:8084}
  notification-service:
    base-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      service: ${spring.application.name}

logging:
  level:
    root: INFO
    uz.quizplatform: DEBUG
