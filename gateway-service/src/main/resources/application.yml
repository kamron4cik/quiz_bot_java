server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/users/**, /api/v1/auth/**, /api/v1/payments/**
        
        - id: quiz-service
          uri: ${QUIZ_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/quiz/**, /api/v1/leaderboard/**

        - id: question-service
          uri: ${QUESTION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/questions/**, /api/v1/categories/**

        - id: admin-service
          uri: ${ADMIN_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/admin/**

        - id: import-service
          uri: ${IMPORT_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/v1/imports/**
      
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      service: ${spring.application.name}

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
