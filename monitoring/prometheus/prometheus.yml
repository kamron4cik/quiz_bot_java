global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'quiz-platform'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'host.docker.internal:8080' # gateway
          - 'host.docker.internal:8081' # telegram
          - 'host.docker.internal:8082' # user
          - 'host.docker.internal:8083' # quiz
          - 'host.docker.internal:8084' # question
          - 'host.docker.internal:8085' # notification
          - 'host.docker.internal:8086' # admin
          - 'host.docker.internal:8087' # import
