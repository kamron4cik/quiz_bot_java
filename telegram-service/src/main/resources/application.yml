server:
  port: 8081

spring:
  application:
    name: telegram-service
  threads:
    virtual:
      enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

# Spring Boot Telegram Bot configuration
telegram:
  bots:
    - token: ${BOT_TOKEN}
      name: ${BOT_USERNAME:QuizBot}
  mode: ${BOT_MODE:polling}  # polling or webhook
  webhook-url: ${WEBHOOK_URL:}

# Backend service URLs (for inter-service HTTP calls)
services:
  user-service:
    base-url: ${USER_SERVICE_URL:http://localhost:8082}
  quiz-service:
    base-url: ${QUIZ_SERVICE_URL:http://localhost:8083}
  question-service:
    base-url: ${QUESTION_SERVICE_URL:http://localhost:8084}
  notification-service:
    base-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}
  admin-service:
    base-url: ${ADMIN_SERVICE_URL:http://localhost:8086}
  import-service:
    base-url: ${IMPORT_SERVICE_URL:http://localhost:8087}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      service: ${spring.application.name}

logging:
  level:
    root: INFO
    uz.quizplatform: DEBUG
    org.telegram: WARN
