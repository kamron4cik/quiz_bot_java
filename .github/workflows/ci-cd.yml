name: CI/CD — Quiz Platform

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/quiz-platform

jobs:

  # ─── Build & Test ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test All Services
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & run tests (all modules)
        run: mvn -B verify --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports
          path: '**/target/surefire-reports/'
          retention-days: 7

      - name: Upload JaCoCo coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 7

  # ─── Static Analysis ──────────────────────────────────────────────────────────
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run SpotBugs & Checkstyle
        run: mvn -B verify -P static-analysis --no-transfer-progress -DskipTests

  # ─── Docker Build & Push ──────────────────────────────────────────────────────
  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - user-service
          - quiz-service
          - question-service
          - notification-service
          - admin-service
          - question-import-service
          - telegram-service
          - gateway-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java for Maven package
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build fat JAR
        run: mvn -B package -pl ${{ matrix.service }} -am -DskipTests --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Staging ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.30.0'

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy with Helm
        run: |
          helm upgrade --install quiz-platform ./helm/quiz-platform \
            --namespace quiz-platform \
            --create-namespace \
            --set global.imageTag=sha-${{ github.sha }} \
            --set global.environment=staging \
            -f helm/quiz-platform/values-staging.yaml \
            --wait \
            --timeout 10m

      - name: Verify deployment health
        run: |
          kubectl rollout status deployment -n quiz-platform --timeout=5m

  # ─── Deploy to Production ─────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: production  # Requires manual approval in GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Production with Helm
        run: |
          helm upgrade --install quiz-platform ./helm/quiz-platform \
            --namespace quiz-platform-prod \
            --set global.imageTag=sha-${{ github.sha }} \
            --set global.environment=production \
            -f helm/quiz-platform/values-production.yaml \
            --wait \
            --timeout 15m
