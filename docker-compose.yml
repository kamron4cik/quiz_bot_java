version: '3.9'

services:
  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: quizplatform-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_CLIENT_REGISTERWITHEUREKA=false
      - EUREKA_CLIENT_FETCHREGISTRY=false
    networks:
      - quizplatform-network
    depends_on:
      - user-service
      - quiz-service
      - admin-service
      - telegram-service

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: quizplatform-user
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/quizplatform
      - SPRING_DATASOURCE_USERNAME=quizplatform
      - SPRING_DATASOURCE_PASSWORD=quizplatform
      - SPRING_RABBITMQ_HOST=rabbitmq
      - PAYMENT_PRICE=${PAYMENT_PRICE}
      - PAYMENT_CARD=${PAYMENT_CARD}
      - PAYMENT_OWNER=${PAYMENT_OWNER}
      - ADMIN_GROUP_ID=${ADMIN_GROUP_ID}
      - FORWARD_CHANNEL_ID=${FORWARD_CHANNEL_ID}
      - ADMIN_IDS=${ADMIN_IDS}
    networks:
      - quizplatform-network

  quiz-service:
    build:
      context: .
      dockerfile: quiz-service/Dockerfile
    container_name: quizplatform-quiz
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/quizplatform
      - SPRING_DATASOURCE_USERNAME=quizplatform
      - SPRING_DATASOURCE_PASSWORD=quizplatform
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_DATA_REDIS_HOST=redis
      - NOTIFICATION_SERVICE_URL=http://notification-service:8080
      - QUESTION_SERVICE_URL=http://question-service:8080
      - USER_SERVICE_URL=http://user-service:8080
    networks:
      - quizplatform-network
    depends_on:
      - user-service

  question-service:
    build:
      context: .
      dockerfile: question-service/Dockerfile
    container_name: quizplatform-question
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/quizplatform
      - SPRING_DATASOURCE_USERNAME=quizplatform
      - SPRING_DATASOURCE_PASSWORD=quizplatform
      - SPRING_RABBITMQ_HOST=rabbitmq
    networks:
      - quizplatform-network

  admin-service:
    build:
      context: .
      dockerfile: admin-service/Dockerfile
    container_name: quizplatform-admin
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/quizplatform
      - SPRING_DATASOURCE_USERNAME=quizplatform
      - SPRING_DATASOURCE_PASSWORD=quizplatform
    networks:
      - quizplatform-network

  telegram-service:
    build:
      context: .
      dockerfile: telegram-service/Dockerfile
    container_name: quizplatform-telegram
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BOT_USERNAME=${TELEGRAM_BOT_USERNAME}
      - USER_SERVICE_URL=http://user-service:8080
      - QUIZ_SERVICE_URL=http://quiz-service:8080
    networks:
      - quizplatform-network
    depends_on:
      - user-service
      - quiz-service

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: quizplatform-notification
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SPRING_RABBITMQ_HOST=rabbitmq
    networks:
      - quizplatform-network

  question-import-service:
    build:
      context: .
      dockerfile: question-import-service/Dockerfile
    container_name: quizplatform-import
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/quizplatform
      - SPRING_DATASOURCE_USERNAME=quizplatform
      - SPRING_DATASOURCE_PASSWORD=quizplatform
      - SPRING_RABBITMQ_HOST=rabbitmq
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=quizplatform
      - MINIO_SECRET_KEY=quizplatform123
    networks:
      - quizplatform-network

networks:
  quizplatform-network:
    name: quizplatform-network
    external: true
