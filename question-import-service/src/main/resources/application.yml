server:
  port: 8087

spring:
  application:
    name: question-import-service
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/quizplatform}
    username: ${DB_USERNAME:quizplatform}
    password: ${DB_PASSWORD:quizplatform}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:quizplatform}
  secret-key: ${MINIO_SECRET_KEY:quizplatform123}
  bucket:
    imports: ${MINIO_BUCKET_IMPORTS:question-imports}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      service: ${spring.application.name}

logging:
  level:
    root: INFO
    uz.quizplatform: DEBUG
