version: '3.9'

# ─── Infrastructure Stack ──────────────────────────────────────────────────────
# Run with: docker-compose -f docker-compose.infra.yml up -d

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: quizplatform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: quizplatform
      POSTGRES_USER: quizplatform
      POSTGRES_PASSWORD: quizplatform
      POSTGRES_MAX_CONNECTIONS: 200
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c effective_cache_size=512MB
        -c log_min_duration_statement=1000
        -c log_lock_waits=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizplatform -d quizplatform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: quizplatform-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ 3.13 ─────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: quizplatform-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: quizplatform
      RABBITMQ_DEFAULT_PASS: quizplatform
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI at http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── MinIO (S3-compatible object storage) ──────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: quizplatform-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: quizplatform
      MINIO_ROOT_PASSWORD: quizplatform123
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # Console UI at http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── Observability: Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: quizplatform-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ../monitoring/prometheus/rules/:/etc/prometheus/rules/
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'

  # ── Observability: Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: quizplatform-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
      GF_SERVER_DOMAIN: localhost
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  # ── Observability: Loki (Log aggregation) ────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: quizplatform-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ../monitoring/loki/loki.yml:/etc/loki/loki.yml
      - loki_data:/loki

  # ── Observability: Tempo (Distributed tracing) ───────────────────────────────
  tempo:
    image: grafana/tempo:latest
    container_name: quizplatform-tempo
    restart: unless-stopped
    ports:
      - "3200:3200"   # Tempo query frontend
      - "4317:4317"   # OpenTelemetry gRPC
      - "4318:4318"   # OpenTelemetry HTTP
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ../monitoring/tempo/tempo.yml:/etc/tempo/tempo.yml
      - tempo_data:/var/tempo

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

networks:
  default:
    name: quizplatform-network
    external: true
